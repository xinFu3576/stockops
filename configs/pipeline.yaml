# 端到端跑批配置

universe:
  # A 股示例
  a_share:
    - 600519.SS   # 贵州茅台
    - 000858.SZ   # 五粮液
  us:
    - AAPL
    - NVDA

schedule:
  timezone: Asia/Shanghai
  runs:
    - name: pre_close_watch
      cron: "15 9 * * 1-5"      # 09:15 早盘预警
      mode: dry_run
    - name: end_of_day_decide
      cron: "0 18 * * 1-5"      # 18:00 收盘后决策
      mode: dry_run
  skip_non_trading_days: true

llm:
  deep: gpt-5.5
  quick: gpt-5.4-mini
  max_debate_rounds: 2
  timeout_seconds: 90

risk:
  max_single_pct: 0.15
  max_industry_pct: 0.30
  regime_gross:
    risk_on: 0.9
    neutral: 0.7
    risk_off: 0.4
  turbulence_kill: 100

execution:
  default_mode: dry_run   # dry_run | paper | live
  live_requires_confirmation: true

notify:
  channels:
    - wework
    - lark
    - telegram
